name: Deploy to GCP Compute Engine

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CONFIG_PATH: ${{ secrets.FIREBASE_CONFIG_PATH }}
      DB_URL: ${{ secrets.DB_URL }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      SPRING_PROFILES_ACTIVE: ${{ secrets.SPRING_PROFILES_ACTIVE }}

    steps:
      # 1. 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Firebase 키 파일 생성
      - name: Create Firebase key file
        run: |
          mkdir -p ./src/main/resources/firebase
          echo '${{ secrets.FIREBASE_CONFIG_JSON }}' > ./src/main/resources/firebase/serviceAccountKey.json
          echo "FIREBASE_CONFIG_PATH=${{ secrets.FIREBASE_CONFIG_PATH }}" > .env
          echo "Firebase key & .env created."

      # 4. Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      # 5. 권한 설정 
      - name: Grant execute permission for gradlew
        working-directory: todak-server
        run: chmod +x gradlew
  
      # 6. 빌드
      - name: Build with Gradle
        working-directory: todak-server
        run: ./gradlew clean build -x test

      # 7. GCP SSH 키 세팅
      - name: Set up SSH key
        run: |
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # 8. GCP VM에 배포
      - name: Deploy to GCP VM
        run: |
          echo "Deploying to GCP VM..."
          scp -i private_key.pem -o StrictHostKeyChecking=no build/libs/*.jar ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }}:/home/${{ secrets.GCP_VM_USER }}/todak-server/todak-server.jar
          scp -i private_key.pem -o StrictHostKeyChecking=no .env ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }}:/home/${{ secrets.GCP_VM_USER }}/todak-server/.env
          ssh -i private_key.pem -o StrictHostKeyChecking=no ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_IP }} "
            echo '🛠 Stopping old process...'
            pkill -f 'todak-server.jar' || true
            cd /home/${{ secrets.GCP_VM_USER }}/todak-server
            echo 'Starting new version...'
            nohup java -jar todak-server.jar --spring.profiles.active=${{ secrets.SPRING_PROFILES_ACTIVE }} > app.log 2>&1 &
            echo 'Deployment finished!'
          "
