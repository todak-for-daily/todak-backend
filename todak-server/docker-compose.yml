version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      interval: 5s
      retries: 10

  app:
    build: .
    container_name: todak-server
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      FIREBASE_CONFIG_PATH: /app/firebase/serviceAccountKey.json
    volumes:
       - ./firebase:/app/firebase

volumes:
  db_data:
